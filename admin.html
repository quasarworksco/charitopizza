<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel Admin · Charito Pizza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red:#D71920;--red-dark:#A50E14;
  --white:#FFFFFF;--cream:#FAFAFA;--gray-100:#F5F5F5;--gray-200:#E8E8E8;
  --gray-400:#BDBDBD;--gray-600:#757575;--dark:#1A1A1A;
  --gold:#F4A200;--green:#1A7A3C;--blue:#1F6FEB;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--dark);font-family:'Poppins',sans-serif;min-height:100vh}

/* Login */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0d0d0d,#1a1a1a)}
.login-card{background:var(--white);border-radius:22px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.4);text-align:center}
.login-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 6px 20px rgba(215,25,32,.35)}
.login-icon svg{width:30px;height:30px;fill:white}
.login-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--gray-600);margin-bottom:22px}
.login-input{width:100%;padding:14px 16px;border-radius:12px;border:1.5px solid var(--gray-200);background:var(--gray-100);font-family:'Poppins',sans-serif;font-size:15px;margin-bottom:10px;text-align:center}
.login-error{display:none;color:var(--red);font-size:12px;margin-bottom:10px}
.login-error.visible{display:block}
.login-btn{width:100%;background:linear-gradient(135deg,var(--red),var(--red-dark));color:white;border:none;border-radius:12px;padding:14px;font-weight:700;font-size:14px;letter-spacing:.5px;cursor:pointer}
.back-link{display:inline-block;margin-top:18px;font-size:12px;color:var(--gray-400);text-decoration:none}

/* App shell */
#app{display:none}
.topbar{background:var(--dark);color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.topbar-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:800;display:flex;align-items:center;gap:10px}
.topbar-title svg{width:22px;height:22px;fill:var(--gold)}
.topbar-actions a{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none;margin-right:16px}
.logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer}

.tabs{display:flex;gap:4px;background:var(--white);padding:0 24px;border-bottom:1.5px solid var(--gray-200);overflow-x:auto;position:sticky;top:64px;z-index:99}
.tab-btn{background:none;border:none;padding:16px 18px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:var(--gray-600);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-badge{background:var(--red);color:white;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}

.view{display:none;max-width:1100px;margin:0 auto;padding:28px 24px 60px}
.view.active{display:block}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.metric-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.metric-label{font-size:12px;color:var(--gray-600);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.metric-value{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;color:var(--dark)}
.metric-value.accent{color:var(--red)}
.section-h{font-family:'Playfair Display',serif;font-size:19px;font-weight:800;margin:28px 0 14px}

/* Orders */
.orders-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.orders-search{flex:1;min-width:180px;padding:11px 14px;border-radius:10px;border:1.5px solid var(--gray-200);font-family:'Poppins',sans-serif;font-size:13px}
.orders-filter{display:flex;gap:6px}
.of-chip{padding:9px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;color:var(--gray-600)}
.of-chip.active{background:var(--dark);color:white;border-color:var(--dark)}
.order-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:14px;padding:16px 18px;margin-bottom:12px}
.order-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.order-name{font-size:15px;font-weight:700}
.order-time{font-size:11px;color:var(--gray-400)}
.order-items{font-size:13px;color:var(--gray-600);line-height:1.6;margin-bottom:10px}
.order-total{font-weight:800;color:var(--red);font-size:16px}
.status-row{display:flex;gap:8px;flex-wrap:wrap}
.status-btn{flex:1;min-width:90px;border:1.5px solid var(--gray-200);background:var(--white);border-radius:9px;padding:9px 8px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--gray-500)}
.status-btn.active-pendiente{background:#FFF3D6;border-color:#F4A200;color:#8A6200}
.status-btn.active-listo{background:#DCEBFF;border-color:#1F6FEB;color:#114A93}
.status-btn.active-entregado{background:#DFF6E1;border-color:#1a8a3a;color:#0f5e26}
.empty-msg{text-align:center;color:var(--gray-400);font-size:13px;padding:30px 0}

/* Customers */
.customers-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.customers-table th{text-align:left;padding:13px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-600);background:var(--gray-100)}
.customers-table td{padding:13px 16px;font-size:13px;border-top:1px solid var(--gray-200)}
.customers-table tr:hover td{background:var(--gray-100)}

/* Prices */
.price-section{background:var(--white);border:1.5px solid var(--gray-200);border-radius:16px;padding:20px;margin-bottom:20px}
.price-section h4{font-size:15px;font-weight:700;margin-bottom:14px}
.price-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-100)}
.price-row:last-child{border-bottom:none}
.price-row-name{flex:1;font-size:13px;font-weight:600}
.price-row label{font-size:10px;color:var(--gray-400);display:block;margin-bottom:2px;text-align:center}
.price-row input{width:72px;padding:8px;border-radius:8px;border:1.5px solid var(--gray-200);font-family:'Poppins',sans-serif;font-size:13px;text-align:center}
.save-bar{position:sticky;bottom:0;background:var(--white);border-top:1.5px solid var(--gray-200);padding:14px 24px;display:flex;justify-content:flex-end;gap:10px;margin:0 -24px}
.save-btn{background:linear-gradient(135deg,var(--red),var(--red-dark));color:white;border:none;border-radius:10px;padding:12px 24px;font-weight:700;font-size:13px;cursor:pointer}
.save-msg{font-size:12px;align-self:center;color:var(--red)}
.save-msg.ok{color:#1a8a3a}

@media(max-width:640px){
  .topbar{padding:14px 16px}
  .view{padding:20px 16px 60px}
  .tabs{padding:0 16px}
  .save-bar{margin:0 -16px;padding:14px 16px}
}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg></div>
    <div class="login-title">Panel Admin</div>
    <div class="login-sub">Charito Pizza · Acceso restringido</div>
    <input type="password" id="code-input" class="login-input" placeholder="Código de acceso" autocomplete="off">
    <p class="login-error" id="code-error">Código incorrecto</p>
    <button class="login-btn" onclick="checkCode()">Entrar</button>
    <a class="back-link" href="index.html">&larr; Volver al sitio</a>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      Charito Pizza Admin
    </div>
    <div class="topbar-actions">
      <a href="index.html" target="_blank">Ver sitio</a>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-view="resumen" onclick="switchView('resumen')">Resumen</button>
    <button class="tab-btn" data-view="pedidos" onclick="switchView('pedidos')">Pedidos <span class="tab-badge" id="pending-badge" style="display:none">0</span></button>
    <button class="tab-btn" data-view="clientes" onclick="switchView('clientes')">Clientes</button>
    <button class="tab-btn" data-view="precios" onclick="switchView('precios')">Precios</button>
  </div>

  <div class="view active" id="view-resumen">
    <div class="metrics-grid" id="metrics-grid"></div>
    <h3 class="section-h">Últimos pedidos</h3>
    <div id="recent-orders"></div>
  </div>

  <div class="view" id="view-pedidos">
    <div class="orders-toolbar">
      <input type="text" class="orders-search" id="orders-search" placeholder="Buscar por nombre de cliente...">
      <div class="orders-filter" id="orders-filter">
        <button class="of-chip active" data-status="todos">Todos</button>
        <button class="of-chip" data-status="pendiente">Pendientes</button>
        <button class="of-chip" data-status="listo">Listos</button>
        <button class="of-chip" data-status="entregado">Entregados</button>
      </div>
    </div>
    <div id="orders-list"></div>
  </div>

  <div class="view" id="view-clientes">
    <table class="customers-table">
      <thead><tr><th>Cliente</th><th>Pedidos</th><th>Total gastado</th><th>Último pedido</th></tr></thead>
      <tbody id="customers-tbody"></tbody>
    </table>
  </div>

  <div class="view" id="view-precios">
    <div class="price-section">
      <h4>🍕 Pizzas</h4>
      <div id="prices-pizzas"></div>
    </div>
    <div class="price-section">
      <h4>🧀 Adicionales</h4>
      <div id="prices-extras"></div>
    </div>
    <div class="price-section">
      <h4>🥤 Bebida y borde de queso</h4>
      <div id="prices-settings"></div>
    </div>
    <div class="save-bar">
      <span class="save-msg" id="prices-save-msg"></span>
      <button class="save-btn" onclick="savePrices()">Guardar todos los cambios</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDocs, collection, setDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAw4JK79wi1kdOjdBTwCcDnpqjBO825-Qk",
  authDomain: "charitopizza-bc8ab.firebaseapp.com",
  projectId: "charitopizza-bc8ab",
  storageBucket: "charitopizza-bc8ab.firebasestorage.app",
  messagingSenderId: "336367097721",
  appId: "1:336367097721:web:01322ba6607357ec0d41a8"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ADMIN_CODE = 'charito2026';

function slugify(name){
  return name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-');
}

// Same pizza/extra catalog as the storefront (names only; prices come from Firestore when available)
const PIZZA_NAMES = [
  {id:'napo',name:'Napolitana',priceFam:17,priceMed:10},
  {id:'estaciones',name:'4 Estaciones',priceFam:22,priceMed:12},
  {id:'pepperoni',name:'Pepperoni',priceFam:19,priceMed:10},
  {id:'vegetariana',name:'Vegetariana',priceFam:20,priceMed:12},
  {id:'quesos',name:'4 Quesos',priceFam:25,priceMed:15},
  {id:'soloqueso',name:'Solo Queso',priceFam:17,priceMed:10},
  {id:'bbq',name:'BBQ',priceFam:25,priceMed:15},
  {id:'maracucha',name:'Maracucha',priceFam:22,priceMed:12},
  {id:'hothoney',name:'Pepperoni Hot Honey',priceFam:22,priceMed:12},
  {id:'pesto',name:'Delicia Pesto',priceFam:23,priceMed:15},
  {id:'tocineta',name:'Pizza de Tocineta',priceFam:20,priceMed:12},
  {id:'chicago',name:'Chicago Pizza',priceFam:25,priceMed:15}
];
const EXTRA_NAMES = [
  {name:'Jamón',price:3},{name:'Tocineta',price:3},{name:'Pepperoni',price:3},
  {name:'Maíz',price:3},{name:'Champiñones',price:3},{name:'Aceitunas',price:3},
  {name:'Plátano',price:3},{name:'Cebolla',price:3},{name:'Jalapeño',price:3},
  {name:'Q. crema',price:3},{name:'Q. azul',price:3},{name:'Q. parmesano',price:3},
  {name:'Pesto',price:3},{name:'Pollo',price:4},{name:'Carne',price:4},
  {name:'Pimentón',price:3},{name:'Tomate',price:3},{name:'Espinaca',price:3}
];

let allOrders=[];
let ordersBound=false;

window.checkCode=function(){
  const val=document.getElementById('code-input').value.trim();
  if(val===ADMIN_CODE){
    sessionStorage.setItem('charito-admin-ok','1');
    showApp();
  }else{
    document.getElementById('code-error').classList.add('visible');
  }
};
document.getElementById('code-input').addEventListener('keydown',e=>{ if(e.key==='Enter') window.checkCode(); });

window.logout=function(){
  sessionStorage.removeItem('charito-admin-ok');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
};

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  initData();
}

if(sessionStorage.getItem('charito-admin-ok')==='1') showApp();

window.switchView=function(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+name));
  if(name==='precios') renderPriceEditor();
  if(name==='clientes') renderCustomers();
};

async function initData(){
  await loadPriceEditorData();
  listenOrders();
}

let pizzasData=[], extrasData=[], settingsData={beveragePrice:5,bordePrice:4};

async function loadPriceEditorData(){
  pizzasData = PIZZA_NAMES.map(p=>({...p}));
  extrasData = EXTRA_NAMES.map(e=>({...e}));
  try{
    const pizzasSnap = await getDocs(collection(db,'pizzas'));
    pizzasSnap.forEach(d=>{
      const p=pizzasData.find(x=>x.id===d.id);
      const data=d.data();
      if(p){
        if(typeof data.priceFam==='number') p.priceFam=data.priceFam;
        if(typeof data.priceMed==='number') p.priceMed=data.priceMed;
      }
    });
    const extrasSnap = await getDocs(collection(db,'extras'));
    extrasSnap.forEach(d=>{
      const e=extrasData.find(x=>slugify(x.name)===d.id);
      const data=d.data();
      if(e && typeof data.price==='number') e.price=data.price;
    });
    const settingsSnap = await getDocs(collection(db,'settings'));
    settingsSnap.forEach(d=>{
      if(d.id==='general'){
        const data=d.data();
        if(typeof data.beveragePrice==='number') settingsData.beveragePrice=data.beveragePrice;
        if(typeof data.bordePrice==='number') settingsData.bordePrice=data.bordePrice;
      }
    });
  }catch(e){ console.warn('Error cargando precios',e); }
}

function renderPriceEditor(){
  document.getElementById('prices-pizzas').innerHTML = pizzasData.map(p=>`
    <div class="price-row" data-pizza-id="${p.id}">
      <span class="price-row-name">${p.name}</span>
      <div><label>Familiar</label><input type="number" min="0" step="0.5" class="pz-fam" value="${p.priceFam}"></div>
      <div><label>Mediana</label><input type="number" min="0" step="0.5" class="pz-med" value="${p.priceMed}"></div>
    </div>
  `).join('');
  document.getElementById('prices-extras').innerHTML = extrasData.map(e=>`
    <div class="price-row" data-extra-name="${e.name}">
      <span class="price-row-name">${e.name}</span>
      <div><label>Precio</label><input type="number" min="0" step="0.5" class="ex-price" value="${e.price}"></div>
    </div>
  `).join('');
  document.getElementById('prices-settings').innerHTML = `
    <div class="price-row">
      <span class="price-row-name">Coca-Cola 2L</span>
      <div><label>Precio</label><input type="number" min="0" step="0.5" id="set-beverage" value="${settingsData.beveragePrice}"></div>
    </div>
    <div class="price-row">
      <span class="price-row-name">Borde de Queso Premium</span>
      <div><label>Precio</label><input type="number" min="0" step="0.5" id="set-borde" value="${settingsData.bordePrice}"></div>
    </div>
  `;
}

window.savePrices=async function(){
  const msg=document.getElementById('prices-save-msg');
  msg.classList.remove('ok');
  msg.textContent='Guardando...';
  try{
    const pizzaRows=document.querySelectorAll('#prices-pizzas .price-row');
    for(const row of pizzaRows){
      const id=row.dataset.pizzaId;
      const priceFam=parseFloat(row.querySelector('.pz-fam').value);
      const priceMed=parseFloat(row.querySelector('.pz-med').value);
      await setDoc(doc(db,'pizzas',id),{priceFam,priceMed},{merge:true});
    }
    const extraRows=document.querySelectorAll('#prices-extras .price-row');
    for(const row of extraRows){
      const name=row.dataset.extraName;
      const price=parseFloat(row.querySelector('.ex-price').value);
      await setDoc(doc(db,'extras',slugify(name)),{price},{merge:true});
    }
    const beveragePrice=parseFloat(document.getElementById('set-beverage').value);
    const bordePrice=parseFloat(document.getElementById('set-borde').value);
    await setDoc(doc(db,'settings','general'),{beveragePrice,bordePrice},{merge:true});
    msg.classList.add('ok');
    msg.textContent='¡Guardado! Los cambios ya están activos en el sitio.';
  }catch(e){
    msg.textContent='Error: '+e.message;
  }
};

// ── Pedidos
function timeAgo(ts){
  if(!ts||!ts.toDate) return '';
  const diffMin=Math.round((Date.now()-ts.toDate().getTime())/60000);
  if(diffMin<1) return 'Justo ahora';
  if(diffMin<60) return 'Hace '+diffMin+' min';
  const diffH=Math.round(diffMin/60);
  if(diffH<24) return 'Hace '+diffH+' h';
  return ts.toDate().toLocaleDateString();
}

function orderCardHtml(o){
  const itemsHtml=o.items.map(i=>`${i.qty}x ${i.name}${i.size?' ('+i.size+')':''}`).join(', ');
  return `
    <div class="order-card" data-id="${o.id}">
      <div class="order-top">
        <div>
          <div class="order-name">${o.customerName}</div>
          <div class="order-time">${timeAgo(o.createdAt)}</div>
        </div>
        <div class="order-total">$${o.total}</div>
      </div>
      <div class="order-items">${itemsHtml}</div>
      <div class="status-row">
        <button class="status-btn ${o.status==='pendiente'?'active-pendiente':''}" onclick="setStatus('${o.id}','pendiente')">Pendiente</button>
        <button class="status-btn ${o.status==='listo'?'active-listo':''}" onclick="setStatus('${o.id}','listo')">Listo</button>
        <button class="status-btn ${o.status==='entregado'?'active-entregado':''}" onclick="setStatus('${o.id}','entregado')">Entregado</button>
      </div>
    </div>`;
}

function listenOrders(){
  if(ordersBound) return;
  ordersBound=true;
  const q=query(collection(db,'orders'), orderBy('createdAt','desc'), limit(200));
  onSnapshot(q, snap=>{
    allOrders=snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderMetrics();
    renderRecentOrders();
    renderOrdersList();
    renderCustomers();
  }, e=>console.warn('Error escuchando pedidos',e));
}

function renderMetrics(){
  const total=allOrders.reduce((s,o)=>s+(o.total||0),0);
  const count=allOrders.length;
  const pending=allOrders.filter(o=>o.status==='pendiente').length;
  const todayStr=new Date().toDateString();
  const todayOrders=allOrders.filter(o=>o.createdAt && o.createdAt.toDate && o.createdAt.toDate().toDateString()===todayStr);
  const todayTotal=todayOrders.reduce((s,o)=>s+(o.total||0),0);
  const avg=count>0?(total/count):0;

  document.getElementById('metrics-grid').innerHTML=`
    <div class="metric-card"><div class="metric-label">Ventas totales</div><div class="metric-value accent">$${total.toFixed(0)}</div></div>
    <div class="metric-card"><div class="metric-label">Pedidos totales</div><div class="metric-value">${count}</div></div>
    <div class="metric-card"><div class="metric-label">Ventas de hoy</div><div class="metric-value accent">$${todayTotal.toFixed(0)}</div></div>
    <div class="metric-card"><div class="metric-label">Pedidos de hoy</div><div class="metric-value">${todayOrders.length}</div></div>
    <div class="metric-card"><div class="metric-label">Pendientes</div><div class="metric-value" style="color:#F4A200">${pending}</div></div>
    <div class="metric-card"><div class="metric-label">Ticket promedio</div><div class="metric-value">$${avg.toFixed(0)}</div></div>
  `;
  const badge=document.getElementById('pending-badge');
  badge.style.display=pending>0?'inline-flex':'none';
  badge.textContent=pending;
}

function renderRecentOrders(){
  const recent=allOrders.slice(0,5);
  document.getElementById('recent-orders').innerHTML = recent.length
    ? recent.map(orderCardHtml).join('')
    : '<p class="empty-msg">Aún no hay pedidos.</p>';
}

let activeStatusFilter='todos';
document.getElementById('orders-filter').addEventListener('click',e=>{
  const chip=e.target.closest('.of-chip');
  if(!chip) return;
  document.querySelectorAll('.of-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeStatusFilter=chip.dataset.status;
  renderOrdersList();
});
document.getElementById('orders-search').addEventListener('input', renderOrdersList);

function renderOrdersList(){
  const query=document.getElementById('orders-search').value.trim().toLowerCase();
  let filtered=allOrders;
  if(activeStatusFilter!=='todos') filtered=filtered.filter(o=>o.status===activeStatusFilter);
  if(query) filtered=filtered.filter(o=>o.customerName.toLowerCase().includes(query));
  document.getElementById('orders-list').innerHTML = filtered.length
    ? filtered.map(orderCardHtml).join('')
    : '<p class="empty-msg">No hay pedidos que coincidan.</p>';
}

window.setStatus=async function(orderId,status){
  try{ await setDoc(doc(db,'orders',orderId),{status},{merge:true}); }
  catch(e){ console.warn('Error actualizando estado',e); }
};

function renderCustomers(){
  const map=new Map();
  allOrders.forEach(o=>{
    const key=o.customerName||'Sin nombre';
    if(!map.has(key)) map.set(key,{name:key,count:0,total:0,last:null});
    const c=map.get(key);
    c.count++;
    c.total+=o.total||0;
    const t=o.createdAt && o.createdAt.toDate ? o.createdAt.toDate() : null;
    if(t && (!c.last || t>c.last)) c.last=t;
  });
  const customers=[...map.values()].sort((a,b)=>b.total-a.total);
  document.getElementById('customers-tbody').innerHTML = customers.length
    ? customers.map(c=>`
        <tr>
          <td>${c.name}</td>
          <td>${c.count}</td>
          <td>$${c.total.toFixed(0)}</td>
          <td>${c.last?c.last.toLocaleDateString():'-'}</td>
        </tr>`).join('')
    : '<tr><td colspan="4" class="empty-msg">Aún no hay clientes registrados.</td></tr>';
}
</script>
</body>
</html>
