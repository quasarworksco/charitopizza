<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charito Pizza – Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Poppins:wght@300;400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:#D71920;--red-dark:#A50E14;--red-deep:#6E0009;--red-pale:#FFF0F0;
  --white:#FFFFFF;--cream:#FAFAFA;--gray-100:#F5F5F5;--gray-200:#E8E8E8;
  --gray-400:#BDBDBD;--gray-600:#757575;--gray-800:#2D2D2D;--dark:#1A1A1A;
  --gold:#F4A200;--green:#1A7A3C;
  --c-clasica:#D71920;--c-nueva:#1B7A3B;--c-especial:#B8860B;
  --c-chicago:#1B4FBD;--c-bbq:#B84000;--c-queso:#9B6F00;--c-pesto:#1B6E2E;
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--dark);font-family:'Poppins',sans-serif;overflow-x:hidden}
header{background:#000;position:relative;overflow:hidden;padding:48px 24px 56px;text-align:center}
header::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(244,162,0,.06) 1px,transparent 1px);background-size:28px 28px}
header::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold),transparent)}
.header-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:300px;border-radius:50%;background:radial-gradient(ellipse,rgba(215,25,32,.12) 0%,transparent 70%);pointer-events:none}
.logo-wrap{display:inline-block;margin-bottom:10px;animation:logoFloat 4s ease-in-out infinite}
.logo-wrap img{width:210px;height:210px;object-fit:contain;mix-blend-mode:screen}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.tagline-wrap{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:4px}
.tagline-line{width:44px;height:1px;background:rgba(255,255,255,.25)}
.tagline{font-size:10px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.7)}
.wave-wrap{line-height:0;background:#000}
.wave-wrap svg{display:block}
main{max-width:1020px;margin:0 auto;padding:52px 24px 160px}
.section-label{display:flex;align-items:center;gap:14px;margin:0 0 30px}
.section-icon{width:40px;height:40px;border-radius:12px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(215,25,32,.35)}
.section-icon svg{width:21px;height:21px}
.section-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:var(--dark)}
.section-rule{flex:1;height:1px;background:linear-gradient(to right,var(--gray-200),transparent)}
.pizza-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px}
.pizza-card{background:var(--white);border-radius:18px;overflow:hidden;border:1.5px solid var(--gray-200);box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.34,1.36,.64,1),box-shadow .3s;animation:cardIn .45s ease both}
.pizza-card:hover{transform:translateY(-6px);box-shadow:0 14px 40px rgba(0,0,0,.13);border-color:rgba(215,25,32,.18)}
.pizza-card:nth-child(1){animation-delay:.03s}.pizza-card:nth-child(2){animation-delay:.07s}.pizza-card:nth-child(3){animation-delay:.11s}.pizza-card:nth-child(4){animation-delay:.15s}.pizza-card:nth-child(5){animation-delay:.19s}.pizza-card:nth-child(6){animation-delay:.23s}.pizza-card:nth-child(7){animation-delay:.27s}.pizza-card:nth-child(8){animation-delay:.31s}.pizza-card:nth-child(9){animation-delay:.35s}.pizza-card:nth-child(10){animation-delay:.39s}.pizza-card:nth-child(11){animation-delay:.43s}.pizza-card:nth-child(12){animation-delay:.47s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:18px 20px 16px;display:flex;align-items:center;gap:13px;position:relative;overflow:hidden}
.card-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(255,255,255,.04) 8px,rgba(255,255,255,.04) 16px)}
.card-header::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08)}
.card-icon-circle{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;backdrop-filter:blur(4px)}
.card-icon-circle svg{width:24px;height:24px;fill:white}
.card-header-info{flex:1;position:relative;z-index:1}
.card-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:2px}
.pizza-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:800;color:white;line-height:1.1}
.corner-badge{position:absolute;top:10px;right:12px;z-index:2;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.badge-nueva{background:white;color:var(--c-nueva)}.badge-especial{background:var(--gold);color:white}
.ch-clasica{background:linear-gradient(135deg,var(--red-dark),var(--red))}.ch-nueva{background:linear-gradient(135deg,#155E2B,#1E8A3D)}.ch-bbq{background:linear-gradient(135deg,#7A2600,#C04000)}.ch-quesos{background:linear-gradient(135deg,#7A5000,#B07800)}.ch-especial{background:linear-gradient(135deg,#8A6200,#C49000)}.ch-pesto{background:linear-gradient(135deg,#155E2B,#1E7A35)}.ch-chicago{background:linear-gradient(135deg,#12347A,#1B4FBD)}
.card-body{padding:16px 20px 18px;flex:1;display:flex;flex-direction:column}
.pizza-desc{font-size:12px;color:var(--gray-600);font-style:italic;margin-bottom:10px;line-height:1.6}
.ingredients{list-style:none;margin-bottom:16px}
.ingredients li{font-size:12.5px;color:var(--gray-800);font-weight:500;padding:3.5px 0;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--gray-100)}
.ingredients li:last-child{border-bottom:none}
.ingredients li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0}
.size-selector{display:flex;gap:8px;margin-bottom:12px;margin-top:auto}
.size-btn{flex:1;padding:9px 6px;border-radius:10px;border:1.5px solid var(--gray-200);background:var(--gray-100);cursor:pointer;text-align:center;transition:all .2s;font-family:'Poppins',sans-serif}
.size-btn:hover{border-color:var(--red);background:var(--red-pale)}
.size-btn.active{border-color:var(--red);background:var(--red)}
.size-btn.active .size-label,.size-btn.active .size-price{color:white}
.size-label{display:block;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-600);margin-bottom:2px}
.size-price{display:block;font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--dark);line-height:1;letter-spacing:-.5px}
.add-btn{width:100%;padding:11px;border-radius:10px;background:var(--dark);color:white;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,transform .15s,box-shadow .2s}
.add-btn:hover{background:var(--red);box-shadow:0 6px 20px rgba(215,25,32,.3);transform:scale(1.01)}
.add-btn:active{transform:scale(.98)}
.add-btn svg{width:15px;height:15px;fill:white}
.section-spacer{margin-top:56px}
.bebida-card{background:var(--white);border-radius:18px;overflow:hidden;border:1.5px solid var(--gray-200);box-shadow:0 2px 10px rgba(0,0,0,.06);max-width:340px;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.34,1.36,.64,1),box-shadow .3s}
.bebida-card:hover{transform:translateY(-6px);box-shadow:0 14px 40px rgba(0,0,0,.13);border-color:rgba(215,25,32,.2)}
.bebida-header{background:linear-gradient(135deg,#8B0000,#C8102E);padding:18px 20px 16px;display:flex;align-items:center;gap:13px;position:relative;overflow:hidden}
.bebida-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(255,255,255,.04) 8px,rgba(255,255,255,.04) 16px)}
.bebida-header::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08)}
.bebida-icon-circle{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.bebida-icon-circle svg{width:24px;height:24px;fill:white}
.bebida-header-info{flex:1;position:relative;z-index:1}
.bebida-badge{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:2px}
.bebida-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:white;line-height:1.1}
.bebida-body{padding:14px 20px 16px;flex:1}
.bebida-price-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.bebida-volume{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-400);margin-bottom:2px}
.bebida-price{font-family:'Oswald',sans-serif;font-size:38px;font-weight:700;color:var(--red);line-height:1;letter-spacing:-1px}
.bev-qty-row{display:flex;align-items:center;gap:0;background:var(--gray-100);border:1.5px solid var(--gray-200);border-radius:12px;overflow:hidden}
.bev-qty-btn{width:38px;height:40px;background:transparent;border:none;color:var(--dark);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;line-height:1}
.bev-qty-btn:hover{background:var(--red);color:white}
.bev-qty-num{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--dark);min-width:32px;text-align:center;border-left:1.5px solid var(--gray-200);border-right:1.5px solid var(--gray-200);padding:0 4px;line-height:40px}
.bev-add-btn{width:100%;padding:11px;border-radius:10px;background:var(--dark);color:white;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,transform .15s,box-shadow .2s}
.bev-add-btn:hover{background:var(--red);box-shadow:0 6px 20px rgba(215,25,32,.3);transform:scale(1.01)}
.bev-add-btn svg{width:15px;height:15px;fill:white}
.cart-fab{position:fixed;bottom:28px;right:28px;z-index:1000;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-dark));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(215,25,32,.5);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
.cart-fab:hover{transform:scale(1.1);box-shadow:0 12px 36px rgba(215,25,32,.6)}
.cart-fab svg{width:28px;height:28px;fill:white}
.cart-count{position:absolute;top:-4px;right:-4px;background:var(--gold);color:white;font-family:'Poppins',sans-serif;font-size:10px;font-weight:800;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2.5px solid white;transform:scale(0);transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.cart-count.visible{transform:scale(1)}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;bottom:0;left:0;right:0;max-height:82vh;background:white;border-radius:26px 26px 0 0;z-index:2001;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -12px 50px rgba(0,0,0,.2)}
.cart-drawer.open{transform:translateY(0)}
.drawer-handle{width:44px;height:5px;border-radius:3px;background:var(--gray-200);margin:14px auto 0}
.drawer-header{padding:16px 24px 14px;border-bottom:1.5px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.drawer-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:var(--dark)}
.drawer-close{background:var(--gray-100);border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}
.drawer-close:hover{background:var(--gray-200)}
.drawer-close svg{width:18px;height:18px;fill:var(--dark)}
.cart-items{flex:1;overflow-y:auto;padding:14px 24px}
.cart-empty{text-align:center;padding:48px 20px;color:var(--gray-400)}
.cart-empty svg{width:56px;height:56px;fill:var(--gray-200);display:block;margin:0 auto 14px}
.cart-empty p{font-size:15px;font-weight:600;color:var(--gray-600)}
.cart-empty small{font-size:12px;color:var(--gray-400);margin-top:4px;display:block}
.cart-item{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1.5px solid var(--gray-100);animation:itemSlide .2s ease}
@keyframes itemSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.cart-item-bar{width:5px;height:44px;border-radius:3px;background:linear-gradient(180deg,var(--red),var(--red-dark));flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-weight:700;font-size:14px;color:var(--dark);line-height:1.2}
.cart-item-size{font-size:11px;color:var(--gray-600);margin-top:2px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.cart-item-controls{display:flex;align-items:center;gap:9px}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--gray-200);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--dark);transition:all .15s;line-height:1}
.qty-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-pale)}
.qty-num{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;min-width:22px;text-align:center}
.cart-item-price{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--red);min-width:48px;text-align:right;letter-spacing:-.3px}
.cart-footer{padding:16px 24px 28px;border-top:1.5px solid var(--gray-100);background:white}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;background:var(--red-pale);padding:14px 18px;border-radius:14px;border:1.5px solid rgba(215,25,32,.1)}
.cart-total-label{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gray-600)}
.cart-total-amount{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;color:var(--red);letter-spacing:-.5px}
.whatsapp-btn{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,#1DA851,#25D366);border:none;cursor:pointer;color:white;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 24px rgba(37,211,102,.35);transition:transform .2s,box-shadow .2s}
.whatsapp-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(37,211,102,.45)}
.whatsapp-btn svg{width:22px;height:22px;fill:white}
.cart-clear{display:block;width:100%;margin-top:10px;background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:2px;text-transform:uppercase;padding:8px;text-align:center;transition:color .2s}
.cart-clear:hover{color:var(--red)}
footer{background:#000;text-align:center;padding:36px 20px;border-top:1px solid rgba(244,162,0,.2)}
.footer-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:white;margin-bottom:6px}
.footer-tagline{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.3)}
@keyframes addPop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
.cart-fab.pop{animation:addPop .35s cubic-bezier(.34,1.56,.64,1)}

/* ── Card extras toggle ── */
.card-extras-toggle{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--red);cursor:pointer;margin-bottom:8px;padding:7px 10px;border-radius:8px;border:1.5px dashed rgba(215,25,32,.3);background:var(--red-pale);transition:background .2s,border-color .2s;user-select:none}
.card-extras-toggle:hover{background:#fcdcde;border-color:rgba(215,25,32,.5)}
.card-extras-toggle.open{background:#fcdcde;border-style:solid;border-color:var(--red)}
.extras-cost-note{color:var(--gray-600);font-weight:500;font-size:10px}
.card-extras-panel{display:none;margin-bottom:10px;animation:panelIn .2s ease}
.card-extras-panel.open{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.card-extras-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.ce-item{padding:6px 8px;border-radius:8px;border:1.5px solid var(--gray-200);background:var(--white);font-size:11px;font-weight:600;color:var(--gray-800);cursor:pointer;text-align:center;transition:all .15s;line-height:1.3;user-select:none}
.ce-item:hover{border-color:var(--red);color:var(--red);background:var(--red-pale)}
.ce-item.selected{border-color:var(--red);background:var(--red);color:white}
.ce-item.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.ce-selected-note{font-size:11px;color:var(--gray-600);font-weight:500;min-height:16px;font-style:italic}
.estaciones-label{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:var(--gray-800);margin-bottom:8px;letter-spacing:.3px}
.estaciones-counter{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:var(--red);background:var(--red-pale);padding:2px 8px;border-radius:10px;border:1.5px solid rgba(215,25,32,.2);transition:background .2s}
.estaciones-counter.full{background:var(--red);color:white;border-color:var(--red)}

/* ═══════════════════════
   MITAD Y MITAD SECTION
═══════════════════════ */
.half-half-toggle{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#1B4FBD;cursor:pointer;margin-bottom:8px;padding:7px 10px;border-radius:8px;border:1.5px dashed rgba(27,79,189,.3);background:#EFF4FF;transition:background .2s,border-color .2s;user-select:none}
.half-half-toggle:hover{background:#D8E5FF;border-color:rgba(27,79,189,.5)}
.half-half-toggle.open{background:#D8E5FF;border-style:solid;border-color:#1B4FBD}
.half-half-panel{display:none;margin-bottom:10px;animation:panelIn .2s ease;border:1.5px solid rgba(27,79,189,.2);border-radius:12px;overflow:hidden}
.half-half-panel.open{display:block}
.half-half-header{background:linear-gradient(135deg,#12347A,#1B4FBD);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.half-half-header span{color:white;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.half-half-body{padding:12px 14px;background:white}
.half-half-side{margin-bottom:10px}
.half-half-side:last-child{margin-bottom:0}
.hh-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hh-label-a{color:#1B4FBD}.hh-label-b{color:#C04000}
.hh-dot-a{width:10px;height:10px;border-radius:50%;background:#1B4FBD;display:inline-block}
.hh-dot-b{width:10px;height:10px;border-radius:50%;background:#C04000;display:inline-block}
.hh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.hh-item{padding:5px 6px;border-radius:7px;border:1.5px solid var(--gray-200);background:var(--gray-100);font-size:10.5px;font-weight:600;color:var(--gray-800);cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.hh-item:hover{border-color:#1B4FBD;color:#1B4FBD;background:#EFF4FF}
.hh-item.sel-a{border-color:#1B4FBD;background:#1B4FBD;color:white}
.hh-item.sel-b{border-color:#C04000;background:#C04000;color:white}
.hh-note{font-size:10.5px;color:var(--gray-600);font-style:italic;margin-top:6px;min-height:14px}
.hh-cost-note{color:var(--gray-600);font-weight:500;font-size:10px}

/* BORDE DE QUESO PREMIUM */
.borde-queso-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:10px;border:1.5px solid rgba(244,162,0,.4);background:linear-gradient(135deg,#FFF8E1,#FFFDE7);margin-bottom:10px;cursor:pointer;transition:all .2s;user-select:none}
.borde-queso-row:hover{border-color:var(--gold);background:#FFF3CC}
.borde-queso-row.active{border-color:var(--gold);background:var(--gold)}
.borde-queso-row.active .bq-label,.borde-queso-row.active .bq-price{color:white}
.bq-left{display:flex;align-items:center;gap:8px}
.bq-icon{font-size:16px}
.bq-label{font-size:11px;font-weight:700;color:#8A6200;letter-spacing:.3px}
.bq-sublabel{font-size:9.5px;color:#A07800;margin-top:1px}
.bq-price{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:-.3px}

// ── Build 4 Estaciones special section
function buildEstacionesSection(){
  const items = EXTRAS.map(e=>`<div class="ce-item" data-name="${e.name}" data-price="0">${e.name}</div>`).join('');
  return `
    <div class="estaciones-label">

    </div>

}

// ── Render all pizza cards
function renderPizzas(){
  const grid = document.getElementById('pizza-grid');
  PIZZAS.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className = 'pizza-card';
    card.dataset.id = p.id;
    card.style.animationDelay = (i*0.04+0.03)+'s';

    const corner = p.cornerBadge
      ? `<div class="corner-badge badge-${p.cornerBadge}">${p.cornerBadge==='nueva'?'Nueva':'Especial'}</div>`
      : '';

    const ingHtml = p.ingredients.map(i=>`<li>${i}</li>`).join('');
    const desc = p.desc ? `<p class="pizza-desc">${p.desc}</p>` : '';

    let specialSection = '';
    if(p.special === 'estaciones') {
      specialSection = buildEstacionesSection();
    } else if(p.special === 'soloqueso') {
      specialSection = buildExtrasHTML(p.id) + buildHalfHalfHTML(p.id);
    } else {
      specialSection = buildExtrasHTML(p.id);
    }

    card.innerHTML = `
      <div class="card-header ${p.color}">
        <div class="card-icon-circle"><svg viewBox="0 0 24 24">${getIconSVG(p.icon)}</svg></div>
        <div class="card-header-info">
          <div class="card-badge">${p.badge}</div>
          <h2 class="pizza-name">${p.name}</h2>
        </div>
        ${corner}
      </div>
      <div class="card-body">
        ${desc}
        <ul class="ingredients">${ingHtml}</ul>
        ${specialSection}
        ${buildBordeHtml(p.id)}
        <div class="size-selector">
          <div class="size-btn active" data-size="${p.sizeA}" data-price="${p.priceFam}">
            <span class="size-label">${p.sizeA}</span><span class="size-price">$${p.priceFam}</span>
          </div>
          <div class="size-btn" data-size="${p.sizeB}" data-price="${p.priceMed}">
            <span class="size-label">${p.sizeB}</span><span class="size-price">$${p.priceMed}</span>
          </div>
        </div>
        <button class="add-btn">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Agregar al pedido
        </button>
      </div>`;
    grid.appendChild(card);
  });

  // Bind events after render
  bindSizeSelectors();
  bindExtrasItems();
  bindHalfHalfItems();
  bindEstacionesItems();
  bindAddButtons();
}

// ── Size selectors
function bindSizeSelectors(){
  document.querySelectorAll('.size-selector').forEach(sel=>{
    sel.querySelectorAll('.size-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        sel.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  });
}

// ── Generic extras
function bindExtrasItems(){
  document.querySelectorAll('.card-extras-panel .ce-item').forEach(item=>{
    item.addEventListener('click',()=>{
      item.classList.toggle('selected');
      const panel = item.closest('.card-extras-panel');
      const noteId = panel.id.replace('-extras-panel','-note');
      const note = document.getElementById(noteId);
      if(!note) return;
      const sel = [...panel.querySelectorAll('.ce-item.selected')];
      if(sel.length===0){note.textContent='';return;}
      const extra = sel.reduce((s,e)=>s+parseInt(e.dataset.price),0);
      note.textContent='Extra: '+sel.map(e=>e.dataset.name).join(', ')+' (+$'+extra+')';
    });
  });
}

// ── Half & Half items
function bindHalfHalfItems(){
  document.querySelectorAll('.hh-item').forEach(item=>{
    item.addEventListener('click',()=>{
      // Determine which side (A or B) based on parent container id
      const parent = item.closest('.hh-grid');
      if(!parent) return;
      const isB = parent.id.includes('-hh-b');
      if(isB){
        item.classList.toggle('sel-b');
      } else {
        item.classList.toggle('sel-a');
      }
      updateHalfHalfNote(parent);
    });
  });
}

function updateHalfHalfNote(changedGrid){
  const panel = changedGrid.closest('.half-half-panel');
  if(!panel) return;
  const noteId = panel.id.replace('-hh-panel','-hh-note');
  const note = document.getElementById(noteId);
  if(!note) return;
  const selA = [...panel.querySelectorAll('[id$="-hh-a"] .sel-a')].map(e=>e.dataset.name);
  const selB = [...panel.querySelectorAll('.sel-b')].map(e=>e.dataset.name);
  const parts = [];
  if(selA.length) parts.push('Mitad A: '+selA.join(', '));
  if(selB.length) parts.push('Mitad B: '+selB.join(', '));
  const cost = (selA.length + selB.length) * 2;
  note.textContent = parts.length ? parts.join(' | ') + (cost?' (+$'+cost+')':'') : 'Selecciona ingredientes para cada mitad';
}

// ── 4 Estaciones
function bindEstacionesItems(){
  const grid = document.getElementById('estaciones-grid');
  if(!grid) return;
  grid.querySelectorAll('.ce-item').forEach(item=>{
    item.addEventListener('click',()=>{
      if(item.classList.contains('disabled')) return;
      const isSel = item.classList.contains('selected');
      if(isSel){item.classList.remove('selected');}
      else{
        const count = grid.querySelectorAll('.ce-item.selected').length;
        if(count>=4) return;
        item.classList.add('selected');
      }
      updateEstCounter();
    });
  });
}

function updateEstCounter(){
  const grid = document.getElementById('estaciones-grid');
  if(!grid) return;
  const count = grid.querySelectorAll('.ce-item.selected').length;
  const counter = document.getElementById('estaciones-counter');
  if(counter){counter.textContent=count+' / 4';counter.classList.toggle('full',count>=4);}
  grid.querySelectorAll('.ce-item:not(.selected)').forEach(el=>el.classList.toggle('disabled',count>=4));
}

// ── Borde de queso toggle
function toggleBorde(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle('active');
}

// ── Extra toggles
function toggleExtras(panelId, toggleEl){
  const panel = document.getElementById(panelId);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  toggleEl.classList.toggle('open',!isOpen);
}

function toggleHalfHalf(panelId, toggleEl){
  const panel = document.getElementById(panelId);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  toggleEl.classList.toggle('open',!isOpen);
}

// ── Add to cart
function bindAddButtons(){
  document.querySelectorAll('.add-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const card = btn.closest('.pizza-card');
      const pizzaId = card.dataset.id;
      const pizzaData = PIZZAS.find(p=>p.id===pizzaId);
      const name = pizzaData.name;
      const active = card.querySelector('.size-btn.active');
      const size = active.dataset.size;
      let price = parseInt(active.dataset.price);
      let extras = [];
      let halfHalfLabel = '';

      if(pizzaId === 'estaciones'){
        const sel = [...document.getElementById('estaciones-grid').querySelectorAll('.ce-item.selected')];
        if(sel.length===0){alert('Por favor selecciona al menos 1 ingrediente para la 4 Estaciones.');return;}
        extras = sel.map(e=>e.dataset.name);
      } else {
        // Generic extras
        const extPanel = document.getElementById(pizzaId+'-extras-panel');
        if(extPanel){
          const sel = [...extPanel.querySelectorAll('.ce-item.selected')];
          sel.forEach(e=>{price+=parseInt(e.dataset.price);});
          if(sel.length) extras = sel.map(e=>e.dataset.name);
        }
        // Half & half
        const hhPanel = document.getElementById(pizzaId+'-hh-panel');
        if(hhPanel && hhPanel.classList.contains('open')){
          const selA = [...hhPanel.querySelectorAll('[id$="-hh-a"] .sel-a')].map(e=>e.dataset.name);
          const selB = [...hhPanel.querySelectorAll('.sel-b')].map(e=>e.dataset.name);
          const hhCount = selA.length + selB.length;
          if(hhCount>0){
            price += hhCount*2;
            const parts=[];
            if(selA.length) parts.push('M.A:'+selA.join('+'));
            if(selB.length) parts.push('M.B:'+selB.join('+'));
            halfHalfLabel = ' ['+parts.join(' | ')+']';
          }
        }
      }

      // Borde de queso
      const borde = document.getElementById(pizzaId+'-borde');
      const hasBorde = borde && borde.classList.contains('active');
      if(hasBorde) price += 3;

      let fullName = name;
      if(extras.length) fullName += ' + '+extras.join(', ');
      if(halfHalfLabel) fullName += halfHalfLabel;
      if(hasBorde) fullName += ' [Borde de Queso]';

      const existing = cart.find(i=>i.name===fullName && i.size===size);
      if(existing) existing.qty++;
      else cart.push({id:cartId++, name:fullName, size, price, qty:1});

      updateCartUI();
      animateFab();
      const orig = btn.innerHTML;
      btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="white"/></svg>¡Agregado!';
      btn.style.background='var(--green)';
      setTimeout(()=>{btn.innerHTML=orig;btn.style.background='';},1200);
    });
  });
}

// ══════════════════════════════════════════
// CART
// ══════════════════════════════════════════
let cart=[], cartId=0;

function updateCartUI(){
  const count=cart.reduce((s,i)=>s+i.qty,0);
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const countEl=document.getElementById('cart-count');
  countEl.textContent=count;
  countEl.classList.toggle('visible',count>0);
  document.getElementById('cart-total').textContent='$'+total;
  const container=document.getElementById('cart-items');
  const empty=document.getElementById('cart-empty');
  container.querySelectorAll('.cart-item').forEach(el=>el.remove());
  if(cart.length===0){empty.style.display='block';return;}
  empty.style.display='none';
  cart.forEach(item=>{
    const el=document.createElement('div');
    el.className='cart-item';
    el.innerHTML=`
      <div class="cart-item-bar"></div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        ${item.size?`<div class="cart-item-size">${item.size}</div>`:''}
      </div>
      <div class="cart-item-controls">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>
      <div class="cart-item-price">$${item.price*item.qty}</div>`;
    container.appendChild(el);
  });
}

function changeQty(id,delta){
  const i=cart.findIndex(x=>x.id===id);
  if(i===-1) return;
  cart[i].qty+=delta;
  if(cart[i].qty<=0) cart.splice(i,1);
  updateCartUI();
}

function clearCart(){
  cart=[];
  document.querySelectorAll('.ce-item.selected').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll('.ce-item.disabled').forEach(el=>el.classList.remove('disabled'));
  document.querySelectorAll('.hh-item').forEach(el=>el.classList.remove('sel-a','sel-b'));
  document.querySelectorAll('.borde-queso-row').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ce-selected-note,.hh-note').forEach(n=>n.textContent='');
  updateEstCounter();
  updateCartUI();
}

function openCart(){
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeCart(){
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
  document.body.style.overflow='';
}
function animateFab(){
  const fab=document.getElementById('cart-fab');
  fab.classList.remove('pop');
  void fab.offsetWidth;
  fab.classList.add('pop');
}

// ── Bebida
let bevQty=0;
document.getElementById('bev-plus').addEventListener('click',()=>{bevQty++;document.getElementById('bev-qty').textContent=bevQty;});
document.getElementById('bev-minus').addEventListener('click',()=>{if(bevQty>0){bevQty--;document.getElementById('bev-qty').textContent=bevQty;}});
document.getElementById('bev-add-btn').addEventListener('click',()=>{
  if(bevQty===0) return;
  const ex=cart.find(i=>i.name==='Coca-Cola 2L');
  if(ex) ex.qty+=bevQty; else cart.push({id:cartId++,name:'Coca-Cola 2L',size:'',price:5,qty:bevQty});
  updateCartUI(); animateFab();
  bevQty=0; document.getElementById('bev-qty').textContent=0;
  const btn=document.getElementById('bev-add-btn');
  const orig=btn.innerHTML; btn.innerHTML='¡Agregado!'; btn.style.background='var(--green)';
  setTimeout(()=>{btn.innerHTML=orig;btn.style.background='';},1200);
});

function sendToWhatsApp(){
  if(cart.length===0){alert('Tu pedido está vacío. Agrega al menos un producto.');return;}
  let msg='🍕 *¡Hola! Quiero hacer un pedido de Charito Pizza:*\n\n';
  cart.forEach(item=>{
    const s=item.size?' ('+item.size+')':'';
    msg+=`• ${item.qty}x ${item.name}${s} — $${item.price*item.qty}\n`;
  });
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  msg+=`\n💰 *Total: $${total}*\n\n¡Gracias! 😊`;
  window.open('https://wa.me/17372729117?text='+encodeURIComponent(msg),'_blank');
}

renderPizzas();
